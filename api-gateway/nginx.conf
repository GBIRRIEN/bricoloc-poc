events {
  worker_connections 1024;
}

http {
  server {
    listen 80;

    location /api/stock {
      proxy_pass http://stock-service:8081;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/entrepots {
      proxy_pass http://entrepot-service:8082;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
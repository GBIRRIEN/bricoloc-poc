services:

  api-gateway:
    image: nginx:alpine
    container_name: bricoloc-gateway
    ports:
      - "8080:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - stock-service
      - entrepot-service

  stock-service:
    build: ./stock-service
    container_name: bricoloc-stock-service
    expose:
      - "8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://stock-db:5432/stock_db
      SPRING_DATASOURCE_USERNAME: bricoloc
      SPRING_DATASOURCE_PASSWORD: bricoloc123
      SERVER_PORT: "8081"
    depends_on:
      stock-db:
        condition: service_healthy

  stock-db:
    image: postgres:16
    container_name: bricoloc-stock-db
    environment:
      POSTGRES_DB: stock_db
      POSTGRES_USER: bricoloc
      POSTGRES_PASSWORD: bricoloc123
    ports:
      - "5433:5432"
    volumes:
      - stock_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bricoloc -d stock_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  entrepot-service:
    build: ./entrepot-service
    container_name: bricoloc-entrepot-service
    expose:
      - "8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://entrepot-db:5432/entrepot_db
      SPRING_DATASOURCE_USERNAME: bricoloc
      SPRING_DATASOURCE_PASSWORD: bricoloc123
      SERVER_PORT: "8082"
    depends_on:
      entrepot-db:
        condition: service_healthy

  entrepot-db:
    image: postgres:16
    container_name: bricoloc-entrepot-db
    environment:
      POSTGRES_DB: entrepot_db
      POSTGRES_USER: bricoloc
      POSTGRES_PASSWORD: bricoloc123
    ports:
      - "5434:5432"
    volumes:
      - entrepot_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bricoloc -d entrepot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: bricoloc-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080

  adminer:
    image: adminer
    container_name: bricoloc-adminer
    ports:
      - "9090:8080"

volumes:
  stock_data:
  entrepot_data:
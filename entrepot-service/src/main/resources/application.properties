spring.application.name=entrepot-service
server.port=8082
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/entrepot_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bricoloc}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bricoloc123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true